{% extends "layout.html" %}

{% block content %}

<div class="content-section">
    <form method="POST">

        <fieldset class="form-group">
            <legend class="border-bottom mb-4">
                Update Expense
            </legend>

            <div class="form-group mb-3">
                <label class="form-control-label">
                    Amount
                </label>

                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control form-control-lg"
                       value="{{ expense.amount }}"
                       required>
            </div>

            <div class="form-group mb-3">
                <label class="form-control-label">
                    Category
                </label>

                <select name="category"
                        class="form-control form-control-lg"
                        required>

                    <option value="Food"
                    {% if expense.category == 'Food' %}selected{% endif %}>
                        Food
                    </option>

                    <option value="Travel"
                    {% if expense.category == 'Travel' %}selected{% endif %}>
                        Travel
                    </option>

                    <option value="Shopping"
                    {% if expense.category == 'Shopping' %}selected{% endif %}>
                        Shopping
                    </option>

                    <option value="Bills"
                    {% if expense.category == 'Bills' %}selected{% endif %}>
                        Bills
                    </option>

                    <option value="Entertainment"
                    {% if expense.category == 'Entertainment' %}selected{% endif %}>
                        Entertainment
                    </option>

                    <option value="Other"
                    {% if expense.category == 'Other' %}selected{% endif %}>
                        Other
                    </option>

                </select>
            </div>

            <div class="form-group mb-3">
                <label class="form-control-label">
                    Description
                </label>

                <textarea name="description"
                          class="form-control"
                          rows="3">{{ expense.description }}</textarea>
            </div>

            <div class="form-group mb-3">
                <label class="form-control-label">
                    Date
                </label>

                <input type="date"
                       name="date"
                       class="form-control form-control-lg"
                       value="{{ expense.date }}"
                       required>
            </div>

        </fieldset>

        <div class="form-group">
            <button class="btn btn-outline-success" type="submit">
                Update Expense
            </button>

            <a href="{{ url_for('dashboard') }}"
               class="btn btn-outline-secondary">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock content %}
